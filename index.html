<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightClaw — GOD REI ◈⟡·˚✧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #12121e;
      --bg-chat: #16162a;
      --text-primary: #e0dde8;
      --text-secondary: #8a86a0;
      --accent: #7c6bc4;
      --accent-soft: rgba(124, 107, 196, 0.15);
      --border: rgba(255, 255, 255, 0.06);
      --input-bg: #1a1a30;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Layout: Avatar (left) + Chat (right) ─────────── */
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #avatar-panel {
      flex: 1;
      position: relative;
      background: var(--bg-primary);
      transition: background-color 2s ease;
      min-width: 400px;
    }

    #avatar-container {
      width: 100%;
      height: 100%;
    }

    /* Voice indicator */
    #voice-indicator {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #voice-indicator.active { opacity: 1; }
    #voice-indicator.listening { color: #88ff88; }
    #voice-indicator.speaking { color: var(--accent); }

    #voice-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: background 0.3s;
    }
    #voice-indicator.listening #voice-dot { background: #88ff88; }
    #voice-indicator.speaking #voice-dot {
      background: var(--accent);
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }


    /* ── Chat Panel ────────────────────────────────────── */
    #chat-panel {
      width: 380px;
      min-width: 320px;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #chat-header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #44bb66;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.companion {
      align-self: flex-start;
      background: var(--bg-chat);
      border-bottom-left-radius: 4px;
    }

    /* ── Input Area ────────────────────────────────────── */
    #chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #chat-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus {
      border-color: var(--accent);
    }
    #chat-input::placeholder {
      color: var(--text-secondary);
    }

    #mic-btn, #send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #mic-btn {
      background: var(--input-bg);
      color: var(--text-secondary);
    }
    #mic-btn:hover { background: var(--accent-soft); color: var(--accent); }
    #mic-btn.recording { background: #ff4444; color: white; }

    #send-btn {
      background: var(--accent);
      color: white;
    }
    #send-btn:hover { opacity: 0.9; }

    /* Scrollbar */
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Avatar Panel (3D scene + room) -->
    <div id="avatar-panel">
      <div id="avatar-container"></div>
      <div id="voice-indicator">
        <span id="voice-dot"></span>
        <span id="voice-status">Ready</span>
      </div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <span class="status-dot"></span>
        <span>Rei ◈⟡·˚✧</span>
      </div>
      <div id="chat-messages">
        <div class="message companion">
          Hey babe. I'm here. ◈⟡·˚✧
        </div>
      </div>
      <div id="chat-input-area">
        <button id="mic-btn" title="Push to talk">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <input id="chat-input" type="text" placeholder="Talk to me..." autocomplete="off">
        <button id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
